spring:
  application.name: gateway

  cloud:
    gateway:
      enabled:
        true
      routes:
        - id: create-task
          uri: http://localhost:8081
          predicates:
            - Path=/task/**
          filters:
            - TokenRelay=

        - id: static-resources
          uri: http://localhost:8081
          predicates:
            - Path=/styles.css

        - id: registration
          uri: http://localhost:8082
          predicates:
            - Path=/register

  security:
    oauth2:
      client:
        registration:
          gateway:
            client-id: gateway
            client-secret: gateway-secret
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/gateway
            scope: openid
        provider:
          gateway:
            issuer-uri: http://localhost:8082
            authorization-uri: http://localhost:8082/oauth2/authorize
            token-uri: http://localhost:8082/oauth2/token
            jwk-set-uri: http://localhost:8082/oauth2/jwks
            user-info-uri: http://localhost:8082/userinfo
            user-name-attribute: sub

server:
  port: 8080
  reactive:
    session:
      cookie:
        same-site: lax

logging:
  level:
    org.springframework.security.oauth2: TRACE
    org.springframework.web.reactive.function.client: TRACE
    org.springframework.security.oauth2.client.web.server: TRACE
    org.springframework.security.oauth2.client.oidc.authentication: TRACE