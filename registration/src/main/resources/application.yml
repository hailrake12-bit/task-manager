spring:
  application.name: registration
  datasource:
    url: jdbc:postgresql://localhost:5434/registration
    username: user
    password: password

  jpa:
    hibernate:
      ddl-auto: update

  security:
    oauth2:
      authorizationserver:
        issuer: http://localhost:8082



server:
  port: 8082
  servlet:
    session:
      cookie:
        same-site: lax
      tracking-modes: cookie


logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: TRACE
